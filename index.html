<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TheBus Ad Architect Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root { --primary-gradient: linear-gradient(45deg, #0d6efd, #0a58ca); }
    body { background-color: var(--bs-body-bg); transition: background-color 0.3s ease; }
    .card { border-radius: 1rem; border: none; }
    .result-box { background: var(--primary-gradient); color: #fff; border-radius: 1rem; padding: 2rem; }
    .package-btn.active { background-color: #0d6efd !important; color: white !important; }
    @media print { .no-print, .btn, #themeToggle { display: none !important; } }
  </style>
</head>

<body data-bs-theme="light">

<div class="container my-5" style="max-width: 1100px;">
    <div class="d-flex justify-content-between align-items-center mb-4 no-print">
        <div class="d-flex align-items-center gap-3">
            <h5 class="text-primary fw-bold mb-0">Ad Architect PWA</h5>
        </div>
        <div class="d-flex gap-2">
            <button id="resetAllBtn" class="btn btn-outline-warning btn-sm">Reset Form</button>
            <button id="destroyDbBtn" class="btn btn-outline-danger btn-sm">Destroy DB</button>
            <button id="themeToggle" class="btn btn-outline-secondary btn-sm"><i class="bi bi-moon-stars"></i></button>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card shadow-sm mb-4">
                <div class="card-body p-4">
                    <form id="adCalculatorForm" class="needs-validation" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">Client Name</label><input type="text" class="form-control" id="advertiserName" required></div>
                            <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" id="email" required></div>
                            <div class="col-md-12"><label class="form-label">Phone</label><input type="tel" class="form-control" id="phone" required></div>
                            
                            <hr>
                            <div class="mb-2 no-print">
                                <div class="row g-2">
                                    <div class="col-4"><small class="text-muted d-block mb-1">STATIC</small><div class="d-grid gap-1" id="pkg-static"></div></div>
                                    <div class="col-4"><small class="text-muted d-block mb-1">MOTION</small><div class="d-grid gap-1" id="pkg-motion"></div></div>
                                    <div class="col-4"><small class="text-muted d-block mb-1">VIDEO</small><div class="d-grid gap-1" id="pkg-video"></div></div>
                                </div>
                            </div>

                            <div class="col-md-4"><label class="form-label">Screens</label><input type="number" class="form-control bg-light" id="screens" readonly></div>
                            <div class="col-md-4"><label class="form-label">Days</label><select class="form-select" id="campaignDays"><option value="30">30 Days</option><option value="60">60 Days</option><option value="90">90 Days</option></select></div>
                            <div class="col-md-4"><label class="form-label">Type</label><select class="form-select" id="adType"><option value="Static" data-fee="0">Static</option><option value="Motion" data-fee="150">Motion</option><option value="Video" data-fee="300">Video</option></select></div>
                            <div class="col-md-12"><label class="form-label">Length (Seconds)</label><input type="number" class="form-control" id="adDuration" value="15"></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="result-box shadow mb-3">
                <h6 class="text-white-50">ESTIMATED TOTAL</h6>
                <h2 class="display-5 fw-bold mb-0" id="totalCost">$0.00</h2>
                <div class="mt-2 mb-3">
                    <span id="adDetailSummary" class="fw-bold">15s Static Ad</span><br>
                    <small class="opacity-75" id="cycleSummary"></small>
                </div>
                
                <div class="bg-white bg-opacity-10 p-2 rounded mb-4">
                    <div class="d-flex justify-content-between">
                        <small>Share of Voice</small>
                        <span id="sovValue">0%</span>
                    </div>
                    <div class="progress mt-1" style="height: 4px;"><div id="sovBar" class="progress-bar bg-white" style="width: 0%"></div></div>
                </div>

                <button class="btn btn-light w-100 mb-2 fw-bold" id="saveQuoteBtn">Add to Comparison</button>
                <button class="btn btn-primary w-100 border-white" id="sendRequestBtn">Email Quote Request</button>
            </div>
            <div style="height: 150px;"><canvas id="reachChart"></canvas></div>
        </div>
    </div>

    <div id="comparisonWrapper" class="card shadow-sm mt-4 d-none">
        <div class="card-body">
            <h6 class="fw-bold mb-3">Saved Comparisons</h6>
            <div class="table-responsive">
                <table class="table table-sm">
                    <thead><tr><th>Type</th><th>SOV</th><th>Days</th><th>Screens</th><th>Total</th><th></th></tr></thead>
                    <tbody id="comparisonBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// --- PWA & DB CONFIG ---
const dbProvider = {
    name: "BusAdsDB",
    store: "quotes",
    async init() {
        return new Promise((resolve) => {
            const req = indexedDB.open(this.name, 1);
            req.onupgradeneeded = (e) => e.target.result.createObjectStore(this.store, { keyPath: "id", autoIncrement: true });
            req.onsuccess = (e) => resolve(e.target.result);
        });
    },
    async getAll() {
        const db = await this.init();
        return new Promise(res => {
            const req = db.transaction(this.store, "readonly").objectStore(this.store).getAll();
            req.onsuccess = () => res(req.result);
        });
    },
    async save(item) {
        const db = await this.init();
        db.transaction(this.store, "readwrite").objectStore(this.store).add(item);
    }
};

const uiConfig = {
    settings: { totalNetworkScreens: 13, minutesPerBlock: 10, dailyOpsHours: 12, busEmail: "sales@transitmedia.com" },
    baseCosts: { static: 0.01, motion: 0.02, video: 0.03 },
    discountBaseCosts: { static: 0.006, motion: 0.008, video: 0.015 },
    packages: {
        static: [{ label: "15s Basic", dur: 15, days: 30 }, { label: "30s Standard", dur: 30, days: 60 }],
        motion: [{ label: "30s Motion", dur: 30, days: 30 }, { label: "45s Pro", dur: 45, days: 60 }],
        video: [{ label: "60s Featured", dur: 60, days: 30 }, { label: "120s Cinema", dur: 120, days: 60 }]
    }
};

// --- CORE LOGIC ---
function calculate() {
    const screens = uiConfig.settings.totalNetworkScreens;
    const days = +$('#campaignDays').val();
    const duration = +$('#adDuration').val();
    const type = $('#adType').val().toLowerCase();
    const fee = +$('#adType option:selected').data('fee');

    const playsH = 6;
    const exposures = playsH * uiConfig.settings.dailyOpsHours * days * screens;
    const rate = (screens >= 13 || days >= 60) ? uiConfig.discountBaseCosts[type] : uiConfig.baseCosts[type];
    const total = (exposures * rate) + fee;

    $('#totalCost').text(total.toLocaleString('en-US', {style:'currency', currency:'USD'}));
    $('#sovValue').text(((duration/600)*100).toFixed(1) + '%');
    $('#sovBar').css('width', ((duration/600)*100) + '%');
    $('#adDetailSummary').text(`${duration}s ${$('#adType').val()} Ad`);
    $('#cycleSummary').text(`${exposures.toLocaleString()} Network Exposures`);
    
    // SAVE DRAFTS TO LOCALSTORAGE (This prevents loss on refresh)
    const draft = {
        name: $('#advertiserName').val(),
        email: $('#email').val(),
        phone: $('#phone').val(),
        days: $('#campaignDays').val(),
        type: $('#adType').val(),
        dur: $('#adDuration').val()
    };
    localStorage.setItem('ad_draft', JSON.stringify(draft));
}

function renderRow(t, s, d, sc, tot) {
    $('#comparisonWrapper').removeClass('d-none');
    $('#comparisonBody').append(`<tr><td>${t}</td><td>${s}</td><td>${d}</td><td>${sc}</td><td class="fw-bold">${tot}</td><td></td></tr>`);
}

// --- EVENTS ---
$(document).ready(async () => {
    // 1. Register Service Worker
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

    // 2. Load Draft from LocalStorage
    const draft = JSON.parse(localStorage.getItem('ad_draft'));
    if(draft) {
        $('#advertiserName').val(draft.name);
        $('#email').val(draft.email);
        $('#phone').val(draft.phone);
        $('#campaignDays').val(draft.days);
        $('#adType').val(draft.type);
        $('#adDuration').val(draft.dur);
    }

    // 3. Load Table from IndexedDB
    const history = await dbProvider.getAll();
    history.forEach(h => renderRow(h.type, h.sov, h.days, h.scr, h.total));

    // 4. Initialize Packages
    ['static', 'motion', 'video'].forEach(cat => {
        uiConfig.packages[cat].forEach(p => {
            const b = $(`<button type="button" class="btn btn-outline-primary btn-sm package-btn">${p.label}</button>`);
            b.click(() => { 
                $('#adType').val(cat.charAt(0).toUpperCase() + cat.slice(1)); 
                $('#adDuration').val(p.dur); 
                $('#campaignDays').val(p.days); 
                calculate(); 
            });
            $(`#pkg-${cat}`).append(b);
        });
    });

    $('#screens').val(uiConfig.settings.totalNetworkScreens);
    calculate();
});

$('#saveQuoteBtn').click(async () => {
    const data = {
        type: $('#adDetailSummary').text(),
        sov: $('#sovValue').text(),
        days: $('#campaignDays').val() + 'd',
        scr: 13,
        total: $('#totalCost').text()
    };
    await dbProvider.save(data);
    renderRow(data.type, data.sov, data.days, data.scr, data.total);
});

$('#sendRequestBtn').click(() => {
    const name = $('#advertiserName').val();
    const currentAd = $('#adDetailSummary').text();
    const currentCost = $('#totalCost').text();
    const sov = $('#sovValue').text();
    
    let tableData = "COMPARISON HISTORY:\n";
    $('#comparisonBody tr').each(function() {
        const cols = $(this).find('td');
        tableData += `- ${$(cols[0]).text()}: ${$(cols[4]).text()} (${$(cols[1]).text()} SOV)\n`;
    });

    const body = `TRANSIT AD QUOTE REQUEST\n\n` +
                 `CLIENT: ${name}\n` +
                 `PHONE: ${$('#phone').val()}\n\n` +
                 `SELECTED PACKAGE DETAILS:\n` +
                 `--------------------------\n` +
                 `Ad Type: ${currentAd}\n` +
                 `Duration: ${$('#campaignDays').val()} Days\n` +
                 `Share of Voice: ${sov}\n` +
                 `Total Estimate: ${currentCost}\n\n` +
                 `${tableData}\n` +
                 `Please contact me regarding availability.`;

    window.location.href = `mailto:${uiConfig.settings.busEmail}?subject=Ad Quote Request: ${name}&body=${encodeURIComponent(body)}`;
});

$('#adCalculatorForm').on('input change', calculate);
$('#resetAllBtn').click(() => { localStorage.removeItem('ad_draft'); location.reload(); });
$('#destroyDbBtn').click(() => { indexedDB.deleteDatabase("BusAdsDB"); localStorage.clear(); location.reload(); });
</script>
</body>
</html>
